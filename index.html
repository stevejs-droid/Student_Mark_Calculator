<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Student Marks Calculator</h1>
        <p class="subtitle">Enter marks for 3 subjects (out of 100)</p>

        <div class="input-group">
            <label for="mark1">Subject 1</label>
            <input type="number" id="mark1" placeholder="Enter marks" min="0" max="100">
        </div>

        <div class="input-group">
            <label for="mark2">Subject 2</label>
            <input type="number" id="mark2" placeholder="Enter marks" min="0" max="100">
        </div>

        <div class="input-group">
            <label for="mark3">Subject 3</label>
            <input type="number" id="mark3" placeholder="Enter marks" min="0" max="100">
        </div>

        <div class="button-group">
            <button onclick="calculateMarks()">Calculate</button>
            <button class="reset-btn" onclick="resetFields()">Reset</button>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
