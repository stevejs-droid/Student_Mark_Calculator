<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Mark Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <h1>Student Mark Calculator</h1>
      <p class="subtitle">Enter marks and get instant results</p>

      <form id="marksForm">
        <div class="input-group">
          <label>Subject 1</label>
          <input type="number" id="sub1" placeholder="Enter marks" min="0" max="100" />
        </div>

        <div class="input-group">
          <label>Subject 2</label>
          <input type="number" id="sub2" placeholder="Enter marks" min="0" max="100" />
        </div>

        <div class="input-group">
          <label>Subject 3</label>
          <input type="number" id="sub3" placeholder="Enter marks" min="0" max="100" />
        </div>

        <div class="input-group">
          <label>Subject 4</label>
          <input type="number" id="sub4" placeholder="Enter marks" min="0" max="100" />
        </div>

        <div class="input-group">
          <label>Subject 5</label>
          <input type="number" id="sub5" placeholder="Enter marks" min="0" max="100" />
        </div>

        <div class="button-group">
          <button type="button" onclick="calculateMarks()">Calculate</button>
          <button type="reset" onclick="resetResult()" class="reset-btn">Reset</button>
        </div>
      </form>
    </div>

    <div class="right-panel">
      <h2>Result Card</h2>
      <div class="result-box">
        <p><span>Total Marks:</span> <strong id="total">0</strong></p>
        <p><span>Average:</span> <strong id="average">0</strong></p>
        <p><span>Percentage:</span> <strong id="percentage">0%</strong></p>
        <p><span>Grade:</span> <strong id="grade">-</strong></p>
        <p id="message">Enter all marks to see the result.</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
